<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rebel BJJ Banner</title>
  <desc id="desc">Hackathon banner for Rebel BJJ, a Solana devnet training proof system built with Rust and Anchor.</desc>
  <defs>
    <linearGradient id="redField" x1="58" y1="38" x2="1160" y2="604" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF1545"/>
      <stop offset="0.46" stop-color="#D8002D"/>
      <stop offset="1" stop-color="#58000F"/>
    </linearGradient>
    <linearGradient id="chainGlow" x1="692" y1="121" x2="1057" y2="508" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14F195"/>
      <stop offset="0.5" stop-color="#80ECFF"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <filter id="bannerShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="16" dy="18" stdDeviation="0" flood-color="#050505" flood-opacity="1"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.2" fill="#F7F1DD" opacity="0.34"/>
    </pattern>
  </defs>

