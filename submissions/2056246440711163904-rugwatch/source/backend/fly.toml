app = "rugwatch-api"
primary_region = "sjc"

[build]

[env]
  DATABASE_URL = "sqlite:///data/rugwatch.db"
  LOG_LEVEL = "INFO"
  DEFAULT_CHAIN = "xlayer"
  POLL_INTERVAL = "60"
  MAX_SLIPPAGE = "0.5"
  DRY_RUN = "false"
  KILL_SWITCH = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "rugwatch_data"
  destination = "/data"
